<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LBM Studio — Client Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f1f5f9;
      --surface:       #ffffff;
      --border:        #e2e8f0;
      --text:          #0f172a;
      --text-muted:    #64748b;
      --accent:        #4f46e5;
      --accent-hover:  #4338ca;
      --accent-light:  #eef2ff;

      --c-filming:     #f59e0b;
      --bg-filming:    #fffbeb;
      --c-editing:     #3b82f6;
      --bg-editing:    #eff6ff;
      --c-review:      #8b5cf6;
      --bg-review:     #f5f3ff;
      --c-approved:    #10b981;
      --bg-approved:   #ecfdf5;
      --c-published:   #64748b;
      --bg-published:  #f8fafc;

      --c-paid:        #10b981;
      --bg-paid:       #ecfdf5;
      --c-pending:     #f59e0b;
      --bg-pending:    #fffbeb;
      --c-overdue:     #ef4444;
      --bg-overdue:    #fef2f2;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .client-chip {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Tab Navigation ─────────────────────────── */
    .tab-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab-nav-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
    }

    .tab-btn {
      padding: 14px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-count {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--bg);
      color: var(--text-muted);
    }

    .tab-btn.active .tab-count {
      background: var(--accent-light);
      color: var(--accent);
    }

    /* ── Main / Panels ──────────────────────────── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Section header ─────────────────────────── */
    .section-header {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
    }

    .section-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ── Stat cards ─────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 16px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── Filter pills ───────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-pill {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-pill:hover { border-color: var(--accent); color: var(--accent); }

    .filter-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ── Video list ─────────────────────────────── */
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow 0.15s;
    }

    .video-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

    .video-thumb {
      width: 76px;
      height: 50px;
      border-radius: 8px;
      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
    }

    .video-info { flex: 1; min-width: 0; }

    .video-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 7px;
    }

    .video-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Badges ─────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-filming   { color: var(--c-filming);   background: var(--bg-filming);  }
    .badge-editing   { color: var(--c-editing);   background: var(--bg-editing);  }
    .badge-review    { color: var(--c-review);    background: var(--bg-review);   }
    .badge-approved  { color: var(--c-approved);  background: var(--bg-approved); }
    .badge-published { color: var(--c-published); background: var(--bg-published); border: 1px solid var(--border); }
    .badge-paid      { color: var(--c-paid);      background: var(--bg-paid);     }
    .badge-pending   { color: var(--c-pending);   background: var(--bg-pending);  }
    .badge-overdue   { color: var(--c-overdue);   background: var(--bg-overdue);  }

    .dot-filming   { background: var(--c-filming);   }
    .dot-editing   { background: var(--c-editing);   }
    .dot-review    { background: var(--c-review);    }
    .dot-approved  { background: var(--c-approved);  }
    .dot-published { background: var(--c-published); }

    .platform-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg);
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .date-text { font-size: 12px; color: var(--text-muted); }

    .btn-action {
      padding: 7px 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .btn-action:hover { background: var(--accent-hover); }

    /* ── Empty state ────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
    }

    .empty-state strong { display: block; font-size: 15px; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; }

    /* ── Calendar ───────────────────────────────── */
    .calendar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .calendar-title { font-size: 15px; font-weight: 600; }

    .cal-nav {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      transition: all 0.15s;
    }

    .cal-nav:hover { background: var(--bg); color: var(--text); }

    .cal-grid-7 {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-day-hdr {
      padding: 10px 6px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    .cal-day {
      min-height: 84px;
      padding: 8px 7px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .cal-day:nth-child(7n) { border-right: none; }
    .cal-day:hover { background: #f8fafc; }
    .cal-day.empty { background: #fafbfc; cursor: default; }
    .cal-day.empty:hover { background: #fafbfc; }
    .cal-day.selected { background: var(--accent-light); }

    .cal-day-num {
      font-size: 13px;
      font-weight: 500;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 4px;
      color: var(--text);
    }

    .cal-day.empty .cal-day-num { color: #c8d3e0; }
    .cal-day.today .cal-day-num { background: var(--accent); color: white; }

    .cal-chips {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cal-chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 5px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cal-chip-filming   { background: var(--bg-filming);  color: var(--c-filming);   }
    .cal-chip-editing   { background: var(--bg-editing);  color: var(--c-editing);   }
    .cal-chip-review    { background: var(--bg-review);   color: var(--c-review);    }
    .cal-chip-approved  { background: var(--bg-approved); color: var(--c-approved);  }
    .cal-chip-published { background: var(--bg);          color: var(--c-published); border: 1px solid var(--border); }

    /* Mobile dot (shown only on small screens) */
    .cal-dot {
      display: none;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin: 2px auto 0;
    }

    /* Calendar detail drawer */
    .cal-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 18px 20px;
      background: #fafbff;
    }

    .cal-detail.visible { display: block; }

    .cal-detail-hdr {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .cal-detail-list { display: flex; flex-direction: column; gap: 8px; }

    .cal-detail-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .cal-detail-item .video-title { font-size: 13px; margin-bottom: 0; flex: 1; min-width: 0; }

    /* ── Invoice table ──────────────────────────── */
    .invoice-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 15px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbff; }

    .inv-num {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      font-weight: 600;
    }

    .inv-amount { font-weight: 600; }

    .btn-dl {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }

    .btn-dl:hover { border-color: var(--accent); color: var(--accent); }

    .invoice-footer {
      padding: 16px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .invoice-footer-note {
      font-size: 13px;
      color: var(--text-muted);
    }

    .invoice-footer-right { text-align: right; }

    .balance-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 2px;
    }

    .balance-amount {
      font-size: 22px;
      font-weight: 700;
    }

    /* ── Attention Banner ───────────────────────── */
    .attention-banner {
      background: #fffbeb;
      border-bottom: 2px solid #fde68a;
      display: none;
    }

    .attention-banner.visible { display: block; }

    .attention-banner-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 14px 24px;
    }

    .attention-banner-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .attention-icon {
      width: 20px;
      height: 20px;
      background: #f59e0b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .attention-title {
      font-size: 14px;
      font-weight: 700;
      color: #92400e;
    }

    .attention-sub {
      font-size: 12px;
      color: #b45309;
      margin-left: auto;
    }

    .attention-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .attention-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 11px 14px;
      flex-wrap: wrap;
    }

    .attention-item-info { flex: 1; min-width: 0; }

    .attention-item-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .attention-item-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .attention-item-btns {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Review / Approval buttons ──────────────── */
    .btn-approve {
      padding: 7px 13px;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #6ee7b7;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .btn-approve:hover { background: #d1fae5; border-color: #34d399; }
    .btn-approve.active { background: #10b981; color: white; border-color: #10b981; }

    .btn-changes {
      padding: 7px 13px;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fdba74;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .btn-changes:hover { background: #ffedd5; border-color: #fb923c; }
    .btn-changes.active { background: #ea580c; color: white; border-color: #ea580c; }

    /* ── Video item wrapper + review panel ──────── */
    .video-item-wrap { display: flex; flex-direction: column; }

    .video-card.review-open {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom-color: transparent;
    }

    .review-panel {
      background: #f8f9ff;
      border: 1px solid var(--accent);
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 16px;
    }

    .review-panel-hdr {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .review-panel-hdr span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .review-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.15s;
      background: white;
    }

    .review-textarea:focus { border-color: var(--accent); }

    .review-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-confirm-approve {
      padding: 8px 16px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-confirm-approve:hover { background: #059669; }

    .btn-confirm-changes {
      padding: 8px 16px;
      background: #ea580c;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-confirm-changes:hover { background: #c2410c; }

    .btn-cancel-review {
      padding: 8px 14px;
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      margin-left: auto;
    }

    .btn-cancel-review:hover { color: var(--text); border-color: #94a3b8; }

    .review-note {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Feedback submitted state ───────────────── */
    .feedback-log {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 9px 12px;
      margin-top: 8px;
    }

    .feedback-log-icon { color: #16a34a; flex-shrink: 0; margin-top: 1px; }

    .feedback-log-body { flex: 1; }

    .feedback-log-action {
      font-size: 12px;
      font-weight: 600;
      color: #15803d;
    }

    .feedback-log-note {
      font-size: 12px;
      color: #166534;
      margin-top: 2px;
      font-style: italic;
    }

    .feedback-log-sub {
      font-size: 11px;
      color: #4ade80;
      margin-top: 3px;
    }

    /* ── Analytics row (VistaSocial) ────────────── */
    .analytics-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .analytics-stat {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .analytics-stat strong {
      color: var(--text);
      font-weight: 600;
    }

    .analytics-sep { color: var(--border); font-size: 12px; }

    .analytics-eng {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      color: #4f46e5;
      background: #eef2ff;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .analytics-source {
      font-size: 11px;
      color: #94a3b8;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 700px) {
      .header-inner { padding: 0 16px; }
      .tab-nav-inner { padding: 0 8px; overflow-x: auto; scrollbar-width: none; }
      .tab-nav-inner::-webkit-scrollbar { display: none; }
      .tab-btn { padding: 12px 12px; font-size: 13px; }
      .main { padding: 16px; }

      .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
      .stat-value { font-size: 24px; }

      .video-card { gap: 12px; padding: 12px; }
      .video-thumb { width: 60px; height: 40px; }
      .video-title { font-size: 13px; }

      /* Calendar: hide chips, show dot */
      .cal-day { min-height: 52px; padding: 6px 4px; }
      .cal-chips { display: none; }
      .cal-day.has-videos .cal-dot { display: block; }
      .cal-day-num { font-size: 12px; width: 22px; height: 22px; }

      /* Table: hide less-critical columns */
      .col-videos, .col-action { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">LBM</div>
      <div>
        <div class="logo-name">LBM Studio</div>
        <div class="logo-sub">Client Portal</div>
      </div>
    </div>
    <div class="client-chip" id="js-client-name"></div>
  </div>
</header>

<!-- ── Tab Nav ─────────────────────────────────────── -->
<nav class="tab-nav">
  <div class="tab-nav-inner">
    <button class="tab-btn active" data-tab="videos" onclick="switchTab('videos')">
      Videos <span class="tab-count" id="js-count-videos"></span>
    </button>
    <button class="tab-btn" data-tab="calendar" onclick="switchTab('calendar')">
      Calendar
    </button>
    <button class="tab-btn" data-tab="invoices" onclick="switchTab('invoices')">
      Invoices <span class="tab-count" id="js-count-invoices"></span>
    </button>
  </div>
</nav>

<!-- ── Attention Banner ────────────────────────────── -->
<div id="js-attention-banner" class="attention-banner">
  <div class="attention-banner-inner">
    <div class="attention-banner-hdr">
      <div class="attention-icon">!</div>
      <div class="attention-title" id="js-attention-title"></div>
      <div class="attention-sub">Action required</div>
    </div>
    <div class="attention-items" id="js-attention-items"></div>
  </div>
</div>

<!-- ── Main ────────────────────────────────────────── -->
<main class="main">

  <!-- Videos Tab -->
  <div class="tab-panel active" id="tab-videos">
    <div class="section-header">
      <div class="section-title">Your Videos</div>
      <div class="section-sub" id="js-videos-sub"></div>
    </div>
    <div class="stats-row" id="js-stats"></div>
    <div class="filter-bar" id="js-filters"></div>
    <div class="video-list" id="js-video-list"></div>
  </div>

  <!-- Calendar Tab -->
  <div class="tab-panel" id="tab-calendar">
    <div class="section-header">
      <div class="section-title">Publishing Calendar</div>
      <div class="section-sub">Tap any day to see scheduled videos</div>
    </div>
    <div class="calendar-card">
      <div class="calendar-header">
        <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
        <div class="calendar-title" id="js-cal-label"></div>
        <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-grid-7" id="js-cal-hdrs"></div>
      <div class="cal-grid-7" id="js-cal-grid"></div>
      <div class="cal-detail" id="js-cal-detail">
        <div class="cal-detail-hdr" id="js-cal-detail-hdr"></div>
        <div class="cal-detail-list" id="js-cal-detail-list"></div>
      </div>
    </div>
  </div>

  <!-- Invoices Tab -->
  <div class="tab-panel" id="tab-invoices">
    <div class="section-header">
      <div class="section-title">Invoices</div>
      <div class="section-sub">Billing history and current balance</div>
    </div>
    <div class="invoice-wrap">
      <table>
        <thead>
          <tr>
            <th>Invoice</th>
            <th>Period</th>
            <th class="col-videos">Videos</th>
            <th>Amount</th>
            <th>Status</th>
            <th class="col-action">PDF</th>
          </tr>
        </thead>
        <tbody id="js-invoice-rows"></tbody>
      </table>
      <div class="invoice-footer" id="js-invoice-footer"></div>
    </div>
  </div>

</main>

<script>
// ── Data ────────────────────────────────────────────────────────────────────

const CLIENT = { name: 'Sarah Mitchell', company: 'Mitchell Ventures' };

const VIDEOS = [
  { id:  1, title: 'How I scaled my business to $10M',             platform: 'LinkedIn',  status: 'Published', publishDate: '2026-04-01', analytics: { views: 2847, likes: 134, comments: 18, shares: 47,  engRate: 4.2 } },
  { id:  2, title: 'Morning routine that changed everything',       platform: 'Instagram', status: 'Published', publishDate: '2026-04-03', analytics: { views: 1923, likes: 89,  comments: 12, shares: 31,  engRate: 3.8 } },
  { id:  3, title: 'Top 5 leadership mistakes CEOs make',           platform: 'YouTube',   status: 'Published', publishDate: '2026-04-07', analytics: { views: 4102, likes: 198, comments: 34, shares: 76,  engRate: 5.1 } },
  { id:  4, title: 'Building a personal brand from scratch',        platform: 'LinkedIn',  status: 'Published', publishDate: '2026-04-09', analytics: { views: 3456, likes: 167, comments: 28, shares: 54,  engRate: 4.7 } },
  { id:  5, title: 'Why authenticity wins on social media',         platform: 'Instagram', status: 'Published', publishDate: '2026-04-12', analytics: { views: 2198, likes: 103, comments: 15, shares: 38,  engRate: 3.9 } },
  { id:  6, title: 'The CEO\'s guide to content creation',          platform: 'LinkedIn',  status: 'Published', publishDate: '2026-04-14', analytics: { views: 1654, likes: 78,  comments:  9, shares: 22,  engRate: 3.3 } },
  { id:  7, title: 'Networking in the digital age',                 platform: 'YouTube',   status: 'Approved',  publishDate: '2026-04-30' },
  { id:  8, title: 'My daily reading list for executives',          platform: 'Instagram', status: 'In Review', publishDate: '2026-05-05' },
  { id:  9, title: 'How to delegate effectively',                   platform: 'LinkedIn',  status: 'In Review', publishDate: '2026-05-08' },
  { id: 10, title: 'The future of personal branding',               platform: 'YouTube',   status: 'Editing',   publishDate: '2026-05-12' },
  { id: 11, title: 'Lessons from 10 years of entrepreneurship',     platform: 'LinkedIn',  status: 'Filming',   publishDate: '2026-05-16' },
  { id: 12, title: 'Building trust with your audience',             platform: 'Instagram', status: 'Filming',   publishDate: '2026-05-20' },
];

const INVOICES = [
  { id: 'INV-2026-003', period: 'February 2026', videos: 12, amount: 3500, status: 'Paid' },
  { id: 'INV-2026-004', period: 'March 2026',    videos: 12, amount: 3500, status: 'Paid' },
  { id: 'INV-2026-005', period: 'April 2026',    videos: 12, amount: 3500, status: 'Pending' },
];

// ── Constants ───────────────────────────────────────────────────────────────

const STATUS_ORDER = ['Filming', 'Editing', 'In Review', 'Approved', 'Published'];
const STATUS_KEY   = { 'Filming':'filming', 'Editing':'editing', 'In Review':'review', 'Approved':'approved', 'Published':'published' };
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ── State ───────────────────────────────────────────────────────────────────

let activeFilter   = 'All';
let calYear        = 2026;
let calMonth       = 3;     // April (0-indexed)
let selectedDay    = null;
let openPanelId    = null;  // video id with open review panel
let openPanelAction = null; // 'approved' | 'changes'
const feedbackState = {};   // { videoId: { action, note, ts } }

// ── Attention Banner ─────────────────────────────────────────────────────────

function renderAttentionBanner() {
  const pending = VIDEOS.filter(v => v.status === 'In Review');
  const banner  = document.getElementById('js-attention-banner');

  if (!pending.length) {
    banner.classList.remove('visible');
    return;
  }

  banner.classList.add('visible');
  document.getElementById('js-attention-title').textContent =
    pending.length === 1
      ? '1 video is waiting for your review'
      : `${pending.length} videos are waiting for your review`;

  document.getElementById('js-attention-items').innerHTML = pending.map(v => `
    <div class="attention-item">
      <div class="attention-item-info">
        <div class="attention-item-title" title="${esc(v.title)}">${esc(v.title)}</div>
        <div class="attention-item-meta">${v.platform} · Scheduled ${fmtDate(v.publishDate)}</div>
      </div>
      <div class="attention-item-btns">
        <button class="btn-approve" onclick="openReviewPanel(${v.id},'approved')">✓ Approve</button>
        <button class="btn-changes" onclick="openReviewPanel(${v.id},'changes')">↩ Changes</button>
      </div>
    </div>`
  ).join('');
}

// ── Review panel ─────────────────────────────────────────────────────────────

function openReviewPanel(id, action) {
  // toggle off if same button clicked again
  if (openPanelId === id && openPanelAction === action) {
    openPanelId = null;
    openPanelAction = null;
  } else {
    openPanelId     = id;
    openPanelAction = action;
  }
  renderVideoList();
  if (openPanelId) {
    const el = document.getElementById('review-panel-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function submitReview(id) {
  const textarea = document.getElementById('review-note-' + id);
  const note     = textarea ? textarea.value.trim() : '';
  const action   = openPanelAction;

  if (action === 'changes' && !note) {
    textarea.focus();
    textarea.style.borderColor = '#ef4444';
    textarea.placeholder = 'Please describe the changes needed before submitting.';
    return;
  }

  // Record feedback — Phase 2: POST to Netlify Function → ClickUp task update + comment
  feedbackState[id] = { action, note, ts: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) };

  // Update video status to match decision
  const video = VIDEOS.find(v => v.id === id);
  if (video) video.status = action === 'approved' ? 'Approved' : 'Editing';

  openPanelId     = null;
  openPanelAction = null;

  renderAttentionBanner();
  renderStats();
  renderFilters();
  renderVideoList();
}

// ── Tabs ────────────────────────────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
}

// ── Videos ──────────────────────────────────────────────────────────────────

function renderStats() {
  const counts = {};
  STATUS_ORDER.forEach(s => { counts[s] = 0; });
  VIDEOS.forEach(v => counts[v.status]++);

  const items = [
    { label: 'Total Videos',  value: VIDEOS.length,                                    color: '#4f46e5' },
    { label: 'In Production', value: counts['Filming'] + counts['Editing'],             color: '#f59e0b' },
    { label: 'Awaiting Review',value: counts['In Review'],                              color: '#8b5cf6' },
    { label: 'Published',     value: counts['Published'],                               color: '#10b981' },
  ];

  document.getElementById('js-stats').innerHTML = items.map(s =>
    `<div class="stat-card">
       <div class="stat-value" style="color:${s.color}">${s.value}</div>
       <div class="stat-label">${s.label}</div>
     </div>`
  ).join('');
}

function renderFilters() {
  const counts = {};
  STATUS_ORDER.forEach(s => { counts[s] = VIDEOS.filter(v => v.status === s).length; });

  const filters = ['All', ...STATUS_ORDER];
  document.getElementById('js-filters').innerHTML = filters.map(f => {
    const n = f === 'All' ? VIDEOS.length : counts[f];
    return `<button class="filter-pill ${activeFilter === f ? 'active' : ''}" onclick="setFilter('${f}')">${f} (${n})</button>`;
  }).join('');
}

function setFilter(status) {
  activeFilter = status;
  renderFilters();
  renderVideoList();
}

function renderVideoList() {
  const list = activeFilter === 'All' ? VIDEOS : VIDEOS.filter(v => v.status === activeFilter);
  const el   = document.getElementById('js-video-list');

  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><strong>No videos found</strong><p>No videos match this filter.</p></div>`;
    return;
  }

  el.innerHTML = list.map(v => {
    const key        = STATUS_KEY[v.status];
    const date       = fmtDate(v.publishDate);
    const lbl        = v.status === 'Published' ? `Published ${date}` : `Scheduled ${date}`;
    const isPanelOpen = openPanelId === v.id;
    const fb          = feedbackState[v.id];

    // Analytics row for published videos
    const analyticsHtml = (v.status === 'Published' && v.analytics) ? `
      <div class="analytics-row">
        <span class="analytics-stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <strong>${v.analytics.views.toLocaleString()}</strong> views
        </span>
        <span class="analytics-sep">·</span>
        <span class="analytics-stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <strong>${v.analytics.likes.toLocaleString()}</strong> likes
        </span>
        <span class="analytics-sep">·</span>
        <span class="analytics-stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <strong>${v.analytics.comments}</strong> comments
        </span>
        <span class="analytics-sep">·</span>
        <span class="analytics-stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <strong>${v.analytics.shares}</strong> shares
        </span>
        <span class="analytics-sep">·</span>
        <span class="analytics-eng">&#9650; ${v.analytics.engRate}% engagement</span>
        <span class="analytics-source">via VistaSocial</span>
      </div>` : '';

    // Feedback submitted indicator
    const feedbackHtml = fb ? `
      <div class="feedback-log">
        <svg class="feedback-log-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <div class="feedback-log-body">
          <div class="feedback-log-action">${fb.action === 'approved' ? 'You approved this video' : 'You requested changes'} · ${fb.ts}</div>
          ${fb.note ? `<div class="feedback-log-note">"${esc(fb.note)}"</div>` : ''}
          <div class="feedback-log-sub">Feedback sent to LBM team via ClickUp</div>
        </div>
      </div>` : '';

    // Action buttons for In Review
    const actionsHtml = v.status === 'In Review' ? `
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="btn-approve ${isPanelOpen && openPanelAction==='approved' ? 'active' : ''}"
          onclick="openReviewPanel(${v.id},'approved')">✓ Approve</button>
        <button class="btn-changes ${isPanelOpen && openPanelAction==='changes' ? 'active' : ''}"
          onclick="openReviewPanel(${v.id},'changes')">↩ Changes</button>
      </div>` : '';

    // Review panel (inline below card)
    const isApproving  = isPanelOpen && openPanelAction === 'approved';
    const isChanging   = isPanelOpen && openPanelAction === 'changes';
    const panelHtml = isPanelOpen ? `
      <div class="review-panel" id="review-panel-${v.id}">
        <div class="review-panel-hdr">
          ${isApproving ? '✓ Approving:' : '↩ Requesting changes on:'}
          <span>${esc(v.title)}</span>
        </div>
        <textarea class="review-textarea" id="review-note-${v.id}"
          placeholder="${isApproving
            ? 'Add an optional note for the LBM team (e.g. great job on the intro)…'
            : 'Describe what needs to change — be as specific as possible…'}"
        ></textarea>
        <div class="review-note">
          ${isChanging ? '* Note is required for change requests.' : ''}
          Your feedback will be sent directly to the LBM team in ClickUp.
        </div>
        <div class="review-actions">
          <button class="${isApproving ? 'btn-confirm-approve' : 'btn-confirm-changes'}"
            onclick="submitReview(${v.id})">
            ${isApproving ? '✓ Confirm Approval' : '↩ Submit Change Request'}
          </button>
          <button class="btn-cancel-review" onclick="openReviewPanel(${v.id},'${openPanelAction}')">Cancel</button>
        </div>
      </div>` : '';

    return `
      <div class="video-item-wrap">
        <div class="video-card ${isPanelOpen ? 'review-open' : ''}">
          <div class="video-thumb">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" opacity=".45">
              <polygon points="6,3 20,12 6,21"/>
            </svg>
          </div>
          <div class="video-info">
            <div class="video-title" title="${esc(v.title)}">${esc(v.title)}</div>
            <div class="video-meta">
              <span class="badge badge-${key}"><span class="badge-dot dot-${key}"></span>${v.status}</span>
              <span class="platform-badge">${v.platform}</span>
              <span class="date-text">${lbl}</span>
            </div>
            ${analyticsHtml}
            ${feedbackHtml}
          </div>
          ${actionsHtml}
        </div>
        ${panelHtml}
      </div>`;
  }).join('');
}

// ── Calendar ────────────────────────────────────────────────────────────────

function renderCalendar() {
  document.getElementById('js-cal-label').textContent = `${MONTHS[calMonth]} ${calYear}`;

  document.getElementById('js-cal-hdrs').innerHTML = DAYS.map(d =>
    `<div class="cal-day-hdr">${d}</div>`
  ).join('');

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today       = new Date();

  const byDay = {};
  VIDEOS.forEach(v => {
    const d = new Date(v.publishDate + 'T12:00:00');
    if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
      const day = d.getDate();
      (byDay[day] = byDay[day] || []).push(v);
    }
  });

  let html = '';

  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day empty"><div class="cal-day-num"></div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday    = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
    const isSelected = selectedDay === d;
    const vids       = byDay[d] || [];
    const hasVideos  = vids.length > 0;

    const chips = vids.slice(0, 2).map(v => {
      const key = STATUS_KEY[v.status];
      return `<div class="cal-chip cal-chip-${key}">${esc(v.title)}</div>`;
    }).join('') + (vids.length > 2 ? `<div class="cal-chip cal-chip-published">+${vids.length - 2} more</div>` : '');

    html += `
      <div class="cal-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${hasVideos ? 'has-videos' : ''}" onclick="${hasVideos || isSelected ? `selectDay(${d})` : ''}">
        <div class="cal-day-num">${d}</div>
        <div class="cal-chips">${chips}</div>
        <div class="cal-dot"></div>
      </div>`;
  }

  document.getElementById('js-cal-grid').innerHTML = html;

  if (selectedDay) renderDayDetail(selectedDay);
}

function selectDay(day) {
  if (selectedDay === day) {
    selectedDay = null;
    document.getElementById('js-cal-detail').classList.remove('visible');
    renderCalendar();
    return;
  }
  selectedDay = day;
  renderCalendar();
  renderDayDetail(day);
}

function renderDayDetail(day) {
  const vids = VIDEOS.filter(v => {
    const d = new Date(v.publishDate + 'T12:00:00');
    return d.getFullYear() === calYear && d.getMonth() === calMonth && d.getDate() === day;
  });

  const detail = document.getElementById('js-cal-detail');
  if (!vids.length) { detail.classList.remove('visible'); return; }

  const label = new Date(calYear, calMonth, day).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('js-cal-detail-hdr').textContent = label;

  document.getElementById('js-cal-detail-list').innerHTML = vids.map(v => {
    const key = STATUS_KEY[v.status];
    return `
      <div class="cal-detail-item">
        <span class="badge badge-${key}"><span class="badge-dot dot-${key}"></span>${v.status}</span>
        <div class="video-title">${esc(v.title)}</div>
        <span class="platform-badge" style="margin-left:auto;flex-shrink:0">${v.platform}</span>
      </div>`;
  }).join('');

  detail.classList.add('visible');
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function changeMonth(dir) {
  selectedDay = null;
  document.getElementById('js-cal-detail').classList.remove('visible');
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();
}

// ── Invoices ────────────────────────────────────────────────────────────────

function renderInvoices() {
  document.getElementById('js-invoice-rows').innerHTML = INVOICES.map(inv => {
    const key = inv.status.toLowerCase();
    return `
      <tr>
        <td><span class="inv-num">${inv.id}</span></td>
        <td>${inv.period}</td>
        <td class="col-videos">${inv.videos} videos</td>
        <td class="inv-amount">$${inv.amount.toLocaleString()}</td>
        <td><span class="badge badge-${key}">${inv.status}</span></td>
        <td class="col-action">
          <a class="btn-dl" href="#" onclick="return false">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
            PDF
          </a>
        </td>
      </tr>`;
  }).join('');

  const totalDue  = INVOICES.filter(i => i.status !== 'Paid').reduce((s, i) => s + i.amount, 0);
  const totalBill = INVOICES.reduce((s, i) => s + i.amount, 0);
  const dueColor  = totalDue > 0 ? '#f59e0b' : '#10b981';

  document.getElementById('js-invoice-footer').innerHTML = `
    <div class="invoice-footer-note">${INVOICES.length} invoices · $${totalBill.toLocaleString()} total billed</div>
    <div class="invoice-footer-right">
      <div class="balance-label">Balance Due</div>
      <div class="balance-amount" style="color:${dueColor}">$${totalDue.toLocaleString()}</div>
    </div>`;
}

// ── Utilities ────────────────────────────────────────────────────────────────

function fmtDate(str) {
  return new Date(str + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('js-client-name').textContent    = CLIENT.name;
document.getElementById('js-count-videos').textContent   = VIDEOS.length;
document.getElementById('js-count-invoices').textContent = INVOICES.length;
document.getElementById('js-videos-sub').textContent     = `April–May 2026 · ${VIDEOS.length} videos in production`;

renderAttentionBanner();
renderStats();
renderFilters();
renderVideoList();
renderCalendar();
renderInvoices();
</script>
